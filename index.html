<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Той шақыруы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Palette ─────────────────────────────────────────
       #F8F5F2  cream (bg)
       #C4AF9C  taupe (borders, ornaments)
       #537787  teal  (secondary, muted text)
       #2C3D51  navy  (hero bg, headings, buttons)
    ─────────────────────────────────────────────────── */
    :root {
      --cream  : #F8F5F2;
      --white  : #FFFFFF;
      --taupe  : #C4AF9C;
      --teal   : #537787;
      --navy   : #2C3D51;
      --navy2  : #3D5268;   /* slightly lighter navy for hover */
      --ink    : #1C2A38;   /* near-black for body text */
      --muted  : #7A8E9A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* ── Scroll animations ───────────────────────────── */
    .fade { opacity: 0; transform: translateY(22px); transition: opacity .85s ease, transform .85s ease; }
    .fade.in { opacity: 1; transform: none; }

    /* ── Shared ornament ─────────────────────────────── */
    .orn {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-bottom: 40px;
    }
    .orn::before, .orn::after {
      content: ''; flex: 1; max-width: 100px; height: 1px;
      background: var(--taupe);
    }
    .orn-dot { font-size: 9px; letter-spacing: 8px; color: var(--taupe); }

    /* ── Section ─────────────────────────────────────── */
    .sec { padding: 96px 24px; text-align: center; }
    .inner { max-width: 560px; margin: 0 auto; }

    /* ── Labels / caps ───────────────────────────────── */
    .cap {
      display: block;
      font-size: .62rem; font-weight: 500;
      letter-spacing: .28em; text-transform: uppercase;
      color: var(--teal); margin-bottom: 20px;
    }

    /* ── Headings ────────────────────────────────────── */
    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400; font-size: clamp(1.8rem, 4vw, 2.4rem);
      color: var(--navy); line-height: 1.2; margin-bottom: 32px;
    }

    p { color: var(--ink); }


    /* ════════════════════════════════════════════════════
       HERO
    ════════════════════════════════════════════════════ */
    #hero {
      min-height: 100svh;
      background: var(--navy);
      display: grid; place-items: center;
      position: relative; overflow: hidden;
      padding: 80px 24px;
    }

    /* Subtle texture overlay */
    #hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%,   rgba(83,119,135,.25) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 100% 100%, rgba(83,119,135,.15) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Corner frames */
    .hero-corner {
      position: absolute;
      width: 120px; height: 120px;
      border-color: var(--taupe);
      border-style: solid;
      opacity: .4;
    }
    .hero-corner.tl { top: 28px; left: 28px;   border-width: 1px 0 0 1px; }
    .hero-corner.tr { top: 28px; right: 28px;  border-width: 1px 1px 0 0; }
    .hero-corner.bl { bottom: 28px; left: 28px; border-width: 0 0 1px 1px; }
    .hero-corner.br { bottom: 28px; right: 28px; border-width: 0 1px 1px 0; }

    .hero-body { position: relative; z-index: 1; text-align: center; }

    .hero-eyebrow {
      display: block;
      font-size: .62rem; font-weight: 500;
      letter-spacing: .32em; text-transform: uppercase;
      color: var(--taupe); margin-bottom: 36px;
    }

    .hero-names {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(4rem, 14vw, 9rem);
      line-height: .95;
      color: var(--cream);
    }
    .hero-name1 { display: block; }
    .hero-amp   {
      display: block;
      font-style: italic;
      font-size: .45em;
      color: var(--taupe);
      margin: 14px 0 10px;
      letter-spacing: .06em;
    }
    .hero-name2 { display: block; }

    .hero-line {
      width: 1px; height: 52px;
      background: linear-gradient(to bottom, var(--taupe), transparent);
      margin: 32px auto 16px;
    }

    .hero-date {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: var(--taupe); letter-spacing: .05em;
    }

    .hero-scroll {
      position: absolute; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: bob 2.4s ease-in-out infinite;
    }
    .hero-scroll-label {
      font-size: .58rem; letter-spacing: .22em;
      text-transform: uppercase; color: var(--taupe); opacity: .65;
    }
    .hero-scroll-bar {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, var(--taupe), transparent);
    }
    @keyframes bob {
      0%,100% { transform: translateX(-50%) translateY(0); opacity: .6; }
      50%      { transform: translateX(-50%) translateY(7px); opacity: 1; }
    }


    /* ════════════════════════════════════════════════════
       INVITE
    ════════════════════════════════════════════════════ */
    #invite { background: var(--white); }

    .invite-salut {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.15rem;
      color: var(--teal); display: block; margin-bottom: 24px;
    }

    .invite-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.05rem, 2.2vw, 1.25rem);
      font-weight: 300; line-height: 2;
      color: var(--ink); margin-bottom: 40px;
    }

    .invite-owner-label {
      font-size: .6rem; font-weight: 500;
      letter-spacing: .24em; text-transform: uppercase;
      color: var(--teal); display: block; margin-bottom: 10px;
    }

    .invite-owners {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; color: var(--navy);
    }


    /* ════════════════════════════════════════════════════
       VENUE
    ════════════════════════════════════════════════════ */
    #venue { background: var(--cream); }

    .venue-cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      max-width: 480px; margin: 0 auto;
    }

    .vc {
      background: var(--white);
      border-top: 2px solid var(--navy);
      padding: 28px 26px;
      text-align: left;
    }

    .vc-lbl {
      font-size: .6rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--teal); display: block; margin-bottom: 10px;
    }

    .vc-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; color: var(--navy); line-height: 1.5;
    }

    .map-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 14px;
      font-size: .68rem; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--teal); text-decoration: none;
      border-bottom: 1px solid var(--taupe);
      padding-bottom: 2px;
      transition: color .2s, border-color .2s;
    }
    .map-link:hover { color: var(--navy); border-color: var(--navy); }
    .map-link svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }


    /* ════════════════════════════════════════════════════
       DETAILS
    ════════════════════════════════════════════════════ */
    #details { background: var(--navy); }
    #details h2 { color: var(--cream); }
    #details .orn::before,
    #details .orn::after { background: var(--teal); opacity: .5; }
    #details .orn-dot { color: var(--taupe); }

    .det-grid {
      display: flex; flex-wrap: wrap; gap: 16px;
      justify-content: center;
      max-width: 500px; margin: 0 auto 28px;
    }

    .det-pill {
      flex: 1 1 200px;
      border: 1px solid rgba(196,175,156,.25);
      padding: 24px 22px; text-align: left;
    }

    .det-lbl {
      font-size: .58rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--taupe); display: block; margin-bottom: 8px;
    }

    .det-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; color: var(--cream); line-height: 1.5;
    }

    /* Halal */
    .halal {
      max-width: 480px; margin: 0 auto;
      background: var(--teal);
      padding: 22px 26px;
      display: flex; align-items: flex-start; gap: 16px;
      text-align: left;
    }
    .halal-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1.3; color: #fff; }
    .halal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 400;
      color: #fff !important;
      margin-bottom: 3px;
    }
    .halal-sub {
      font-size: .8rem; font-weight: 300;
      color: rgba(255,255,255,.8) !important;
      line-height: 1.5;
    }


    /* ════════════════════════════════════════════════════
       MESSAGE
    ════════════════════════════════════════════════════ */
    #message { background: var(--white); }

    .msg-body {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.05rem, 2.2vw, 1.3rem);
      line-height: 2; color: var(--ink);
      max-width: 480px; margin: 0 auto 40px;
    }

    .msg-sign-lbl {
      font-size: .6rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--teal); display: block; margin-bottom: 10px;
    }

    .msg-names {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 2.2rem;
      color: var(--navy);
    }
    .msg-amp { color: var(--taupe); }


    /* ════════════════════════════════════════════════════
       RSVP
    ════════════════════════════════════════════════════ */
    #rsvp { background: var(--cream); }

    .rsvp-hint {
      font-size: .93rem; color: var(--muted);
      max-width: 400px; margin: 0 auto 40px;
    }

    form {
      max-width: 440px; margin: 0 auto; text-align: left;
    }

    .fg { margin-bottom: 22px; }

    .fg > label {
      display: block;
      font-size: .62rem; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--navy); margin-bottom: 9px;
    }
    .req::after { content: ' *'; color: var(--taupe); }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--white);
      border: 1px solid var(--taupe);
      padding: 13px 16px;
      font-family: 'Jost', sans-serif;
      font-size: .95rem; font-weight: 300;
      color: var(--ink); outline: none;
      border-radius: 0;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus,
    input[type="number"]:focus { border-color: var(--navy); }

    /* Radios */
    .radios { display: flex; gap: 10px; flex-wrap: wrap; }

    .rl {
      flex: 1 1 150px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      border: 1px solid var(--taupe);
      padding: 12px 16px;
      font-size: .9rem; font-weight: 300; color: var(--ink);
      transition: border-color .2s, background .2s;
    }
    .rl:has(input:checked) {
      border-color: var(--navy);
      background: rgba(44,61,81,.05);
    }
    .rl input[type="radio"] { display: none; }

    .rb {
      width: 17px; height: 17px;
      border: 1px solid var(--taupe);
      border-radius: 50%;
      display: grid; place-items: center; flex-shrink: 0;
      transition: border-color .2s;
    }
    .rb::after {
      content: ''; width: 8px; height: 8px;
      border-radius: 50%; background: var(--navy);
      opacity: 0; transition: opacity .2s;
    }
    .rl:has(input:checked) .rb { border-color: var(--navy); }
    .rl:has(input:checked) .rb::after { opacity: 1; }

    #fg-count { display: none; }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: var(--navy);
      color: var(--cream);
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: .7rem; font-weight: 500;
      letter-spacing: .26em; text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      margin-top: 8px;
    }
    .btn-submit:hover:not(:disabled) { background: var(--teal); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    #form-err {
      display: none;
      background: #FDF0EE;
      border: 1px solid #D4A09A;
      padding: 11px 16px;
      margin-top: 14px;
      font-size: .85rem; color: #7A2A22;
    }

    #rsvp-ok { display: none; text-align: center; padding: 48px 0; }
    .ok-icon {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; color: var(--taupe);
      margin-bottom: 14px; line-height: 1;
    }
    .ok-h {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; color: var(--navy); margin-bottom: 10px;
    }
    .ok-p { font-size: .9rem; color: var(--muted); }


    /* ════════════════════════════════════════════════════
       FOOTER
    ════════════════════════════════════════════════════ */
    footer {
      background: var(--navy);
      text-align: center;
      padding: 52px 24px;
    }
    .ft-names {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 2rem;
      color: var(--cream); margin-bottom: 10px;
    }
    .ft-date {
      font-size: .72rem; letter-spacing: .16em;
      color: var(--taupe);
    }


    /* ════════════════════════════════════════════════════
       MUSIC BUTTON
    ════════════════════════════════════════════════════ */
    #music-btn {
      position: fixed;
      bottom: 26px; right: 22px; z-index: 999;
      width: 46px; height: 46px;
      background: var(--navy);
      border: 1px solid var(--taupe);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(44,61,81,.35);
      transition: background .2s, transform .15s;
    }
    #music-btn:hover { background: var(--teal); transform: scale(1.08); }
    #music-btn svg {
      width: 18px; height: 18px;
      stroke: var(--cream); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    .eq { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
    .eq span {
      width: 3px; background: var(--cream); border-radius: 2px;
      animation: eq .85s ease-in-out infinite alternate;
    }
    .eq span:nth-child(1) { animation-delay: 0s;   height: 55%; }
    .eq span:nth-child(2) { animation-delay: .15s; height: 100%; }
    .eq span:nth-child(3) { animation-delay: .3s;  height: 40%; }
    .eq span:nth-child(4) { animation-delay: .08s; height: 75%; }
    @keyframes eq {
      from { transform: scaleY(.2); }
      to   { transform: scaleY(1); }
    }
    #music-btn.paused .eq span { animation-play-state: paused; }
  </style>
</head>
<body>

<!-- ══════ HERO ════════════════════════════════════════ -->
<section id="hero">
  <div class="hero-corner tl"></div>
  <div class="hero-corner tr"></div>
  <div class="hero-corner bl"></div>
  <div class="hero-corner br"></div>

  <div class="hero-body">
    <span class="hero-eyebrow fade" id="hero-eyebrow"></span>

    <h1 class="hero-names fade" aria-label="">
      <span class="hero-name1" id="h-name1"></span>
      <span class="hero-amp">&amp;</span>
      <span class="hero-name2" id="h-name2"></span>
    </h1>

    <div class="hero-line"></div>
    <p class="hero-date fade" id="hero-date"></p>
  </div>

  <div class="hero-scroll" aria-hidden="true">
    <span class="hero-scroll-label" id="scroll-lbl"></span>
    <div class="hero-scroll-bar"></div>
  </div>
</section>

<!-- ══════ INVITE ══════════════════════════════════════ -->
<section id="invite" class="sec">
  <div class="inner">
    <span class="invite-salut fade" id="invite-salut"></span>
    <div class="orn fade"><span class="orn-dot">◆ ◆ ◆</span></div>
    <p class="invite-body fade" id="invite-body"></p>
    <span class="invite-owner-label fade" id="owner-lbl"></span>
    <p class="invite-owners fade" id="invite-owners"></p>
  </div>
</section>

<!-- ══════ VENUE ═══════════════════════════════════════ -->
<section id="venue" class="sec">
  <div class="inner">
    <span class="cap fade" id="venue-cap"></span>
    <div class="orn fade"><span class="orn-dot">◆ ◆ ◆</span></div>
    <div class="venue-cards fade">
      <div class="vc">
        <span class="vc-lbl" id="vc-time-lbl"></span>
        <p class="vc-val" id="vc-time"></p>
      </div>
      <div class="vc">
        <span class="vc-lbl" id="vc-addr-lbl"></span>
        <p class="vc-val" id="vc-addr"></p>
        <a class="map-link" id="vc-map" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="vc-map-lbl"></span>
        </a>
      </div>
    </div>
  </div>
</section>

<!-- ══════ DETAILS ═════════════════════════════════════ -->
<section id="details" class="sec">
  <div class="inner">
    <span class="cap fade" style="color:var(--taupe)" id="det-cap"></span>
    <div class="orn fade"><span class="orn-dot">◆ ◆ ◆</span></div>
    <div class="det-grid fade" id="det-grid"></div>
    <div class="halal fade" id="halal">
      <span class="halal-icon">☪</span>
      <div>
        <p class="halal-title" id="halal-title"></p>
        <p class="halal-sub"   id="halal-sub"></p>
      </div>
    </div>
  </div>
</section>

<!-- ══════ MESSAGE ═════════════════════════════════════ -->
<section id="message" class="sec">
  <div class="inner">
    <div class="orn fade"><span class="orn-dot">◆ ◆ ◆</span></div>
    <p class="msg-body fade" id="msg-body"></p>
    <span class="msg-sign-lbl fade" id="msg-sign-lbl"></span>
    <p class="msg-names fade">
      <span id="msg-n1"></span>
      <span class="msg-amp"> &amp; </span>
      <span id="msg-n2"></span>
    </p>
  </div>
</section>

<!-- ══════ RSVP ════════════════════════════════════════ -->
<section id="rsvp" class="sec">
  <div class="inner">
    <span class="cap fade" id="rsvp-cap"></span>
    <div class="orn fade"><span class="orn-dot">◆ ◆ ◆</span></div>
    <p class="rsvp-hint fade" id="rsvp-hint"></p>

    <form class="fade" id="rsvp-form" novalidate>
      <div class="fg">
        <label for="f-name" class="req" id="l-name"></label>
        <input type="text" id="f-name" name="name" autocomplete="name" />
      </div>

      <div class="fg">
        <label class="req" id="l-attend"></label>
        <div class="radios">
          <label class="rl">
            <input type="radio" name="attending" value="yes" />
            <span class="rb"></span>
            <span id="r-yes"></span>
          </label>
          <label class="rl">
            <input type="radio" name="attending" value="no" />
            <span class="rb"></span>
            <span id="r-no"></span>
          </label>
        </div>
      </div>

      <div class="fg" id="fg-count">
        <label for="f-count" id="l-count"></label>
        <input type="number" id="f-count" name="guests" min="1" max="10" value="1" />
      </div>

      <button type="submit" class="btn-submit" id="btn-submit"></button>
      <div id="form-err" role="alert"></div>
    </form>

    <div id="rsvp-ok">
      <span class="ok-icon">✦</span>
      <p class="ok-h"  id="ok-h"></p>
      <p class="ok-p"  id="ok-p"></p>
    </div>
  </div>
</section>

<!-- ══════ FOOTER ══════════════════════════════════════ -->
<footer>
  <span class="ft-names" id="ft-names"></span>
  <span class="ft-date"  id="ft-date"></span>
</footer>

<!-- ══════ MUSIC ═══════════════════════════════════════ -->
<button id="music-btn" class="paused" aria-label="Музыка">
  <svg id="icon-note" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  <div class="eq" id="icon-eq" style="display:none">
    <span></span><span></span><span></span><span></span>
  </div>
</button>

<audio id="bg-audio" src="music.mp3" loop preload="auto"></audio>

<!-- ══════ SCRIPT ══════════════════════════════════════ -->
<script>
/* ── Apps Script URL ──────────────────────────────── */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZPzP4f1qoPO_3zaFs7adcl9TbIVpvkZP74_lDljgpaPkuhTr79Pw7Kc411ngp7XbA/exec';

/* ── CONFIG ───────────────────────────────────────── */

  groom: '[АТЫ]',

/* ── Render ───────────────────────────────────────── */
function s(id, v) { const e = document.getElementById(id); if (e) e.textContent = v; }

function render() {
  const { groom, bride, date, owners, venueTime, venueAddress,
          venueMapUrl, dresscode, deadline, ui } = CONFIG;

  document.title = `${groom} & ${bride} — Той шақыруы`;

  s('hero-eyebrow', ui.heroEyebrow);
  s('h-name1', groom); s('h-name2', bride);
  s('hero-date', date);
  s('scroll-lbl', ui.scrollLbl);

  s('invite-salut', ui.inviteSalut);
  s('invite-body',  ui.inviteBody);
  s('owner-lbl',    ui.ownerLbl);
  s('invite-owners', owners);

  s('venue-cap',  ui.venueCap);
  s('vc-time-lbl', ui.vcTimeLbl); s('vc-time', venueTime);
  s('vc-addr-lbl', ui.vcAddrLbl); s('vc-addr', venueAddress);
  s('vc-map-lbl',  ui.vcMapLbl);
  const map = document.getElementById('vc-map');
  if (map) map.href = venueMapUrl;

  s('det-cap', ui.detCap);
  const grid = document.getElementById('det-grid');
  if (grid) {
    grid.innerHTML = [
      { l: ui.detDresscode, v: dresscode },
      { l: ui.detDeadline,  v: deadline  },
    ].map(d => `<div class="det-pill">
        <span class="det-lbl">${d.l}</span>
        <p class="det-val">${d.v}</p>
      </div>`).join('');
  }

  s('halal-title', ui.halalTitle);
  s('halal-sub',   ui.halalSub);

  s('msg-body',     ui.msgBody);
  s('msg-sign-lbl', ui.msgSignLbl);
  s('msg-n1', groom); s('msg-n2', bride);

  s('rsvp-cap',  ui.rsvpCap);
  s('rsvp-hint', ui.rsvpHint);
  s('l-name',    ui.lName);
  s('l-attend',  ui.lAttend);
  s('r-yes',     ui.rYes);
  s('r-no',      ui.rNo);
  s('l-count',   ui.lCount);
  s('btn-submit', ui.btnSubmit);
  s('ok-h', ui.okH); s('ok-p', ui.okP);

  s('ft-names', `${groom} & ${bride}`);
  s('ft-date',  date);
}

/* ── Animations ───────────────────────────────────── */
function initAnim() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('in'), i * 80);
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade').forEach(el => obs.observe(el));
}

/* ── Music ────────────────────────────────────────── */
function initMusic() {
  const audio = document.getElementById('bg-audio');
  const btn   = document.getElementById('music-btn');
  const note  = document.getElementById('icon-note');
  const eq    = document.getElementById('icon-eq');
  let playing = false;
  let unlocked = false;

  function setPlaying(on) {
    playing = on;
    note.style.display = on ? 'none' : 'block';
    eq.style.display   = on ? 'flex' : 'none';
    btn.classList.toggle('paused', !on);
  }

  function tryPlay() {
    if (unlocked) return;
    unlocked = true;
    audio.volume = 0.5;
    audio.play().then(() => setPlaying(true)).catch(() => {});
  }

  document.addEventListener('click',      tryPlay, { once: true });
  document.addEventListener('touchstart', tryPlay, { once: true });

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (playing) { audio.pause(); setPlaying(false); }
    else { unlocked = true; audio.play().then(() => setPlaying(true)).catch(() => {}); }
  });
}

/* ── Form ─────────────────────────────────────────── */
function initForm() {
  const form    = document.getElementById('rsvp-form');
  const btn     = document.getElementById('btn-submit');
  const errDiv  = document.getElementById('form-err');
  const okDiv   = document.getElementById('rsvp-ok');
  const fcGroup = document.getElementById('fg-count');
  const { ui }  = CONFIG;

  form.querySelectorAll('input[name="attending"]').forEach(r => {
    r.addEventListener('change', () => {
      fcGroup.style.display = r.value === 'yes' ? 'block' : 'none';
    });
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errDiv.style.display = 'none';

    const name     = document.getElementById('f-name').value.trim();
    const attended = form.querySelector('input[name="attending"]:checked');
    const count    = document.getElementById('f-count').value;

    if (!name)     { showErr(ui.errName);   document.getElementById('f-name').focus(); return; }
    if (!attended) { showErr(ui.errAttend); return; }
    if (!APPS_SCRIPT_URL) { showErr(ui.errNoUrl); return; }

    setLoad(true);
    try {
      const res  = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          name,
          attending: attended.value,
          guests: attended.value === 'yes' ? (parseInt(count, 10) || 1) : 0,
        }),
      });
      const data = await res.json();
      if (data.result === 'success') {
        form.style.display  = 'none';
        okDiv.style.display = 'block';
      } else {
        showErr(data.message || ui.errNet);
        setLoad(false);
      }
    } catch {
      showErr(ui.errNet);
      setLoad(false);
    }
  });

  function showErr(msg) {
    errDiv.textContent = msg;
    errDiv.style.display = 'block';
    errDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function setLoad(on) {
    btn.disabled    = on;
    btn.textContent = on ? ui.btnSending : ui.btnSubmit;
  }
}

/* ── Init ─────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  render();
  initAnim();
  initMusic();
  initForm();
});
