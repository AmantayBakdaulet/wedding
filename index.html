<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Той шақыруы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ────────────────────────────────────────────
       PALETTE  Warm Elegant
       #FFFFFF  white
       #FAF8F5  cream
       #C4A882  gold
       #5C3D2E  brown
       #2A1A0E  dark
    ──────────────────────────────────────────── */
    :root {
      --white : #FFFFFF;
      --cream : #FAF8F5;
      --warm  : #DDD0C4;
      --gold  : #C4A882;
      --brown : #5C3D2E;
      --dark  : #2A1A0E;
      --muted : #9A8878;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'PT Sans', sans-serif;
      font-weight: 400;
      font-size: 18px;
      background: var(--cream);
      color: var(--dark);
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* ── Fade animations ─────────────────────── */
    .fade { opacity: 0; transform: translateY(20px); transition: opacity .9s ease, transform .9s ease; }
    .fade.in { opacity: 1; transform: none; }

    /* ── Sections ────────────────────────────── */
    .sec { padding: 96px 24px; text-align: center; }
    .inner { max-width: 560px; margin: 0 auto; }

    /* ── Caps ────────────────────────────────── */
    .cap {
      display: block;
      font-size: .6rem; font-weight: 500;
      letter-spacing: .3em; text-transform: uppercase;
      color: var(--brown); margin-bottom: 18px;
    }

    /* ── Headings ────────────────────────────── */
    h2 {
      font-family: 'Lora', serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 5vw, 3.2rem);
      color: var(--dark); line-height: 1.2; margin-bottom: 36px;
    }

    p { color: var(--dark); }


    /* ════════════════════════════════════════════
       ORNAMENT COMPONENTS
    ════════════════════════════════════════════ */

    .orn-rule {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 44px;
    }
    .orn-rule-line {
      height: 1px; flex: 1; max-width: 120px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .orn-rule-line.rev {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .orn-rule-center {
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px;
    }
    .orn-rule-center .d  { width:7px; height:7px; background:var(--gold); transform:rotate(45deg); }
    .orn-rule-center .ds { width:4px; height:4px; background:var(--gold); transform:rotate(45deg); opacity:.5; }

    .orn-branch { display:block; margin: 0 auto 44px; max-width:380px; width:100%; }

    .wave { display:block; line-height:0; overflow:hidden; }
    .wave svg { display:block; width:100%; }

    .frame {
      position: relative;
      padding: 36px 32px;
      margin-bottom: 36px;
    }
    .frame::before, .frame::after,
    .frame > .fc::before, .frame > .fc::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: .6;
    }
    .frame::before   { top:0;    left:0;  border-width:1px 0 0 1px; }
    .frame::after    { top:0;    right:0; border-width:1px 1px 0 0; }
    .frame > .fc::before { bottom:0; left:0;  border-width:0 0 1px 1px; }
    .frame > .fc::after  { bottom:0; right:0; border-width:0 1px 1px 0; }

    .pat {
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(196,168,130,.1) 1px, transparent 1px);
      background-size: 28px 28px;
    }


    /* ════════════════════════════════════════════
       HERO
    ════════════════════════════════════════════ */
    #hero {
      height: 85vh;
      display: grid; place-items: center;
      position: relative;
      text-align: center;
      padding: 48px 24px;
      overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute; inset: -20px;
      background: url('ref2.png') center/cover no-repeat;
      transform: scale(1);
    }
    #hero::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.28);
      z-index: 0;
    }

    .hero-body {
      position: relative; z-index: 1;
    }

    .hero-eyebrow {
      display: block;
      font-size: 1rem; font-weight: 500;
      letter-spacing: .35em; text-transform: uppercase;
      color: rgba(255,255,255,0.8); margin-bottom: 28px;
    }

    .hero-names {
      font-family: 'Lora', serif;
      font-weight: 400;
      font-size: clamp(3.5rem, 12vw, 9rem);
      line-height: .95; color: #ffffff;
      text-shadow: 0 2px 24px rgba(0,0,0,0.45);
    }
    .hero-amp {
      display: block; font-style: italic;
      font-size: .42em; color: var(--gold);
      margin: 12px 0 8px; letter-spacing: .05em;
      text-shadow: 0 1px 12px rgba(0,0,0,0.4);
    }

    .hero-sep {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin: 24px auto 16px;
    }
    .hero-sep-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .hero-sep-line.rev { background: linear-gradient(to left, transparent, var(--gold)); }
    .hero-sep-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }

    .hero-sep-line {
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.6));
    }
    .hero-sep-line.rev {
      background: linear-gradient(to left, transparent, rgba(255,255,255,0.6));
    }
    .hero-sep-diamond { background: var(--gold); }

    .hero-date {
      font-family: 'Lora', serif; font-style: italic;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: rgba(255,255,255,0.9); letter-spacing: .05em;
      text-shadow: 0 1px 10px rgba(0,0,0,0.4);
    }


    /* ════════════════════════════════════════════
       INVITE
    ════════════════════════════════════════════ */
    #invite { background: var(--white); }

    .invite-salut {
      font-family: 'Lora', serif;
      font-style: italic; font-weight: 400; font-size: 2.2rem;
      color: var(--brown); display: block; margin-bottom: 28px;
    }

    .invite-body {
      font-family: 'Lora', serif;
      font-size: clamp(1.3rem, 2.8vw, 1.65rem);
      line-height: 2; color: var(--dark);
    }

    .invite-owner-label {
      font-size: .6rem; font-weight: 500;
      letter-spacing: .24em; text-transform: uppercase;
      color: var(--brown); display: block; margin-bottom: 10px;
    }
    .invite-owners {
      font-family: 'Lora', serif;
      font-size: 2rem; color: var(--dark);
    }


    /* ════════════════════════════════════════════
       VENUE
    ════════════════════════════════════════════ */
    #venue { background: var(--cream); }

    .venue-cards { display: grid; gap: 16px; max-width: 480px; margin: 0 auto; }

    .vc {
      background: var(--white);
      position: relative; overflow: hidden;
      padding: 28px 26px 28px 36px;
      text-align: left;
    }
    .vc::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(to bottom, var(--brown), var(--gold));
    }

    .vc-lbl {
      font-size: .58rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--brown); display: block; margin-bottom: 10px;
    }
    .vc-val {
      font-family: 'Lora', serif;
      font-size: 1.65rem; color: var(--dark); line-height: 1.5;
      white-space: pre-line;
    }

    .map-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 14px;
      font-size: .67rem; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--brown); text-decoration: none;
      border-bottom: 1px solid var(--gold); padding-bottom: 2px;
      transition: color .2s, border-color .2s;
    }
    .map-link:hover { color: var(--dark); border-color: var(--dark); }
    .map-link svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }


    /* ════════════════════════════════════════════
       CALENDAR
    ════════════════════════════════════════════ */
    #calendar { background: var(--white); }

    .cal-wrap { max-width: 340px; margin: 0 auto; }

    .cal-month {
      font-family: 'Lora', serif; font-style: italic; font-weight: 600;
      font-size: 2.4rem; color: var(--brown);
      margin-bottom: 24px; line-height: 1;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .cal-dn {
      font-size: .55rem; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); text-align: center;
      padding-bottom: 8px;
    }

    .cal-d {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Lora', serif;
      font-size: 1rem; color: var(--dark);
      border-radius: 50%;
      transition: background .2s;
    }

    .cal-d.cal-wedding {
      background: var(--brown);
      color: var(--cream);
      font-weight: 600;
      position: relative;
    }
    /* small diamond below wedding date */
    .cal-d.cal-wedding::after {
      content: '♥';
      position: absolute; bottom: -18px; left: 50%;
      transform: translateX(-50%);
      font-size: .55rem; color: var(--gold);
    }

    .cal-d.cal-muted { color: var(--warm); }


    /* ════════════════════════════════════════════
       DETAILS (dark)
    ════════════════════════════════════════════ */
    #details {
      background: var(--dark);
      position: relative; overflow: hidden;
    }
    #details h2 { color: var(--cream); }
    #details .cap { color: rgba(196,168,130,.7); }
    #details .orn-rule-line     { background: linear-gradient(to right, transparent, rgba(196,168,130,.4)); }
    #details .orn-rule-line.rev { background: linear-gradient(to left,  transparent, rgba(196,168,130,.4)); }
    #details .orn-rule-center .d  { background: var(--gold); }
    #details .orn-rule-center .ds { background: var(--gold); }

    .det-grid {
      display: flex; flex-wrap: wrap; gap: 14px;
      justify-content: center;
      max-width: 500px; margin: 0 auto 24px;
    }
    .det-pill {
      flex: 1 1 200px;
      border: 1px solid rgba(196,168,130,.2);
      padding: 24px 22px; text-align: left;
      position: relative;
    }
    .det-pill::before {
      content: '';
      position: absolute; top: -4px; right: -4px;
      width: 8px; height: 8px;
      background: var(--gold); transform: rotate(45deg);
      opacity: .6;
    }
    .det-lbl {
      font-size: .58rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: rgba(196,168,130,.7); display: block; margin-bottom: 8px;
    }
    .det-val {
      font-family: 'Lora', serif;
      font-size: 1.1rem; color: var(--cream); line-height: 1.5;
    }


    /* ════════════════════════════════════════════
       MESSAGE
    ════════════════════════════════════════════ */
    #message { background: var(--white); }

    .msg-body {
      font-family: 'Lora', serif; font-style: italic;
      font-size: clamp(1.3rem, 2.8vw, 1.65rem);
      line-height: 2; color: var(--dark);
      max-width: 480px; margin: 0 auto 40px;
    }
    .msg-sign-lbl {
      font-size: .6rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--brown); display: block; margin-bottom: 10px;
    }
    .msg-names {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 3rem; color: var(--dark);
    }
    .msg-amp { color: var(--gold); }


    /* ════════════════════════════════════════════
       RSVP
    ════════════════════════════════════════════ */
    #rsvp { background: var(--cream); }

    .rsvp-hint {
      font-size: .9rem; color: var(--muted);
      max-width: 400px; margin: 0 auto 40px;
    }

    form { max-width: 440px; margin: 0 auto; text-align: left; }
    .fg { margin-bottom: 22px; }
    .fg > label {
      display: block;
      font-size: .62rem; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--dark); margin-bottom: 9px;
    }
    .req::after { content: ' *'; color: var(--gold); }

    input[type="text"], input[type="number"] {
      width: 100%; background: var(--white);
      border: 1px solid var(--warm);
      padding: 13px 16px;
      font-family: 'PT Sans', sans-serif;
      font-size: .95rem; font-weight: 400; color: var(--dark);
      outline: none; border-radius: 0;
      transition: border-color .2s; -webkit-appearance: none;
    }
    input:focus { border-color: var(--brown); }

    .radios { display: flex; gap: 10px; flex-wrap: wrap; }
    .rl {
      flex: 1 1 150px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; border: 1px solid var(--warm);
      padding: 12px 16px;
      font-size: .9rem; font-weight: 400; color: var(--dark);
      transition: border-color .2s, background .2s;
    }
    .rl:has(input:checked) { border-color: var(--brown); background: rgba(92,61,46,.05); }
    .rl input[type="radio"] { display: none; }
    .rb {
      width: 17px; height: 17px;
      border: 1px solid var(--warm); border-radius: 50%;
      display: grid; place-items: center; flex-shrink: 0;
      transition: border-color .2s;
    }
    .rb::after {
      content: ''; width: 8px; height: 8px;
      border-radius: 50%; background: var(--brown);
      opacity: 0; transition: opacity .2s;
    }
    .rl:has(input:checked) .rb { border-color: var(--brown); }
    .rl:has(input:checked) .rb::after { opacity: 1; }

    #fg-count { display: none; }

    .btn-submit {
      width: 100%; padding: 15px;
      background: var(--dark); color: var(--cream);
      border: none;
      font-family: 'PT Sans', sans-serif;
      font-size: .7rem; font-weight: 500;
      letter-spacing: .26em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, opacity .2s; margin-top: 8px;
    }
    .btn-submit:hover:not(:disabled) { background: var(--brown); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    #form-err {
      display: none; background: #FDF0EE;
      border: 1px solid #D4A09A;
      padding: 11px 16px; margin-top: 14px;
      font-size: .85rem; color: #7A2A22;
    }

    #rsvp-ok { display: none; text-align: center; padding: 48px 0; }
    .ok-icon {
      display: block; font-family: 'Lora', serif;
      font-size: 3rem; color: var(--gold);
      margin-bottom: 14px; line-height: 1;
    }
    .ok-h { font-family:'Cormorant Garamond',serif; font-size:2rem; color:var(--dark); margin-bottom:10px; }
    .ok-p { font-size:.9rem; color:var(--muted); }


    /* ════════════════════════════════════════════
       FOOTER
    ════════════════════════════════════════════ */
    footer {
      background: var(--dark);
      text-align: center; padding: 52px 24px;
      position: relative;
    }
    .ft-ornament { display: block; margin: 0 auto 24px; opacity: .45; }
    .ft-names {
      display: block;
      font-family: 'Lora', serif; font-style: italic;
      font-size: 2.8rem;
      color: var(--cream); margin-bottom: 10px;
    }
    .ft-date { font-size: .7rem; letter-spacing: .16em; color: var(--gold); opacity: .7; }


    /* ════════════════════════════════════════════
       PHOTO STRIPS
    ════════════════════════════════════════════ */
    .photo-strip {
      width: 100%; overflow: hidden;
      line-height: 0;
    }
    .photo-strip img {
      width: 100%; height: 380px;
      object-fit: cover; object-position: center;
      display: block;
    }
    @media (max-width: 600px) {
      .photo-strip img { height: 260px; }
    }

    /* ════════════════════════════════════════════
       MUSIC BUTTON
    ════════════════════════════════════════════ */
    #music-btn {
      position: fixed; bottom: 26px; right: 22px; z-index: 999;
      width: 46px; height: 46px;
      background: var(--dark); border: 1px solid rgba(196,168,130,.5);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(42,26,14,.35);
      transition: background .2s, transform .15s;
    }
    #music-btn:hover { background: var(--brown); transform: scale(1.08); }
    #music-btn svg {
      width: 18px; height: 18px;
      stroke: var(--cream); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    .eq { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
    .eq span {
      width: 3px; background: var(--cream); border-radius: 2px;
      animation: eqb .85s ease-in-out infinite alternate;
    }
    .eq span:nth-child(1){animation-delay:0s;height:55%}
    .eq span:nth-child(2){animation-delay:.15s;height:100%}
    .eq span:nth-child(3){animation-delay:.3s;height:40%}
    .eq span:nth-child(4){animation-delay:.08s;height:75%}
    @keyframes eqb { from{transform:scaleY(.2)} to{transform:scaleY(1)} }
    #music-btn.paused .eq span { animation-play-state: paused; }

    #music-hint {
      display: none;
      position: fixed; bottom: 84px; right: 16px; z-index: 998;
      background: var(--dark); color: var(--cream);
      border: 1px solid rgba(196,168,130,.4);
      padding: 10px 14px; gap: 8px;
      align-items: center;
      font-size: .72rem; letter-spacing: .05em;
      box-shadow: 0 4px 16px rgba(42,26,14,.3);
      animation: hintin .4s ease;
      cursor: pointer;
    }
    #music-hint svg { stroke: var(--gold); flex-shrink: 0; }
    @keyframes hintin { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     HERO
══════════════════════════════════════════ -->
<section id="hero">
  <div class="hero-body">
    <span class="hero-eyebrow fade" id="hero-eyebrow"></span>
    <h1 class="hero-names fade">
      <span id="h-name1"></span>
      <span class="hero-amp">&amp;</span>
      <span id="h-name2"></span>
    </h1>
    <div class="hero-sep fade">
      <div class="hero-sep-line"></div>
      <div class="hero-sep-diamond"></div>
      <div class="hero-sep-line rev"></div>
    </div>
    <p class="hero-date fade" id="hero-date"></p>
  </div>
</section>


<!-- ══════════════════════════════════════════
     INVITE
══════════════════════════════════════════ -->
<section id="invite" class="sec" style="padding-top:48px">
  <div class="inner">
    <span class="invite-salut fade" id="invite-salut"></span>

    <svg class="orn-branch fade" viewBox="0 0 400 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="197" y="22" width="7" height="7" transform="rotate(45 197 22)" fill="#C4A882"/>
      <rect x="190" y="25" width="4" height="4" transform="rotate(45 190 25)" fill="#C4A882" opacity=".4"/>
      <rect x="206" y="25" width="4" height="4" transform="rotate(45 206 25)" fill="#C4A882" opacity=".4"/>
      <path d="M193 25.5 C170 25 130 24 80 28" stroke="#C4A882" stroke-width=".9" stroke-linecap="round"/>
      <path d="M162 24.5 C158 16 150 14 147 18 C150 23 158 24 162 24.5Z" fill="#C4A882" opacity=".55"/>
      <path d="M138 25 C135 17 127 15 124 19 C127 24 135 25 138 25Z" fill="#C4A882" opacity=".45"/>
      <path d="M162 26 C165 18 172 16 175 20 C172 25 165 26 162 26Z" fill="#C4A882" opacity=".35"/>
      <path d="M80 28 C64 24 50 20 38 23" stroke="#C4A882" stroke-width=".7" stroke-linecap="round"/>
      <path d="M80 28 C66 32 52 34 42 31" stroke="#C4A882" stroke-width=".7" stroke-linecap="round"/>
      <circle cx="80" cy="28" r="2" fill="#C4A882" opacity=".5"/>
      <path d="M207 25.5 C230 25 270 24 320 28" stroke="#C4A882" stroke-width=".9" stroke-linecap="round"/>
      <path d="M238 24.5 C242 16 250 14 253 18 C250 23 242 24 238 24.5Z" fill="#C4A882" opacity=".55"/>
      <path d="M262 25 C265 17 273 15 276 19 C273 24 265 25 262 25Z" fill="#C4A882" opacity=".45"/>
      <path d="M238 26 C235 18 228 16 225 20 C228 25 235 26 238 26Z" fill="#C4A882" opacity=".35"/>
      <path d="M320 28 C336 24 350 20 362 23" stroke="#C4A882" stroke-width=".7" stroke-linecap="round"/>
      <path d="M320 28 C334 32 348 34 358 31" stroke="#C4A882" stroke-width=".7" stroke-linecap="round"/>
      <circle cx="320" cy="28" r="2" fill="#C4A882" opacity=".5"/>
    </svg>

    <div class="frame fade">
      <div class="fc"></div>
      <p class="invite-body" id="invite-body"></p>
    </div>

    <div class="orn-rule fade">
      <div class="orn-rule-line"></div>
      <div class="orn-rule-center">
        <div class="ds"></div><div class="d"></div><div class="ds"></div>
      </div>
      <div class="orn-rule-line rev"></div>
    </div>

    <span class="invite-owner-label fade" id="owner-lbl"></span>
    <p class="invite-owners fade" id="invite-owners"></p>
  </div>
</section>

<div class="photo-strip">
  <img src="photo6.png" alt="" loading="lazy" />
</div>


<!-- ══════════════════════════════════════════
     VENUE
══════════════════════════════════════════ -->
<section id="venue" class="sec" style="padding-top:72px; background:var(--cream)">
  <div class="inner">

<!-- ══════ SCRIPT ════════════════════════════════════ -->
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZPzP4f1qoPO_3zaFs7adcl9TbIVpvkZP74_lDljgpaPkuhTr79Pw7Kc411ngp7XbA/exec';

const CONFIG = {
  groom: 'Бақдәулет',
  bride: 'Тоғжан',
  date:  '17.07.2026',
  owners:       'Сабира апа & Ербол & Гульбану',
  venueTime:    '19:00',
  venueAddress: 'Golden Hall\nТараз, Ташкентская 268',
  venueMapUrl:  'https://go.2gis.com/aphld',
  ui: {
    heroEyebrow: 'Тойға шақыру',
    scrollLbl:   'Төмен',
    inviteSalut: 'Құрметті қонақтар!',
    inviteBody:  'Сіздерді Бақдәулет пен Тоғжанның шаңырақ көтеру тойына арналған салтанатты ақ дастарханымыздың қадірлі қонағы болуға шақырамыз.',
    ownerLbl:    'Той иелері:',
    venueCap:    'Той өтетін орын',
    vcTimeLbl:   'Басталу уақыты',
    vcAddrLbl:   'Мекен-жай',
    vcMapLbl:    'Картада ашу',
    calCap:      'Той күні',
    calMonth:    'Шілде 2026',
    calDays:     ['ДС','СС','СР','БС','ЖМ','СН','ЖС'],
    msgBody:     'Жуырда біздің өміріміздегі ең бақытты күндердің бірі болмақ! Сол бақытты күнде сіздерді жанымыздан көріп, қуанышымызбен бөліскіміз келеді! Тойымыздың салтанатты дастарханында сіздерді күтеміз!',
    msgSignLbl:  'Құрметпен,',
    rsvpCap:     'Қатысуыңызды растаңыз',
    lName:       'Толық аты-жөні',
    lAttend:     'Келесіз бе?',
    rYes:        'Иә, келемін',
    rNo:         'Жоқ, келмеймін',
    lCount:      'Қанша адам?',
    btnSubmit:   'Жіберу',
    btnSending:  'Жіберілуде...',
    okH:         'Рахмет!',
    okP:         'Жауабыңыз қабылданды. Тойда кездескенше!',
    errName:     'Аты-жөніңізді жазыңыз.',
    errAttend:   'Жауап нұсқасын таңдаңыз.',
    errNoUrl:    'APPS_SCRIPT_URL орнатылмаған.',
    errNet:      'Жіберу қатесі. Байланысты тексеріп, қайта көріңіз.',
  }
};

function s(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

function render(){
  const{groom,bride,date,owners,venueTime,venueAddress,venueMapUrl,ui}=CONFIG;
  document.title=`${groom} & ${bride} — Той шақыруы`;
  s('hero-eyebrow',ui.heroEyebrow); s('h-name1',groom); s('h-name2',bride);
  s('hero-date',date); s('scroll-lbl',ui.scrollLbl);
  s('invite-salut',ui.inviteSalut); s('invite-body',ui.inviteBody);
  s('owner-lbl',ui.ownerLbl); s('invite-owners',owners);
  s('venue-cap',ui.venueCap);
  s('vc-time-lbl',ui.vcTimeLbl); s('vc-time',venueTime);
  s('vc-addr-lbl',ui.vcAddrLbl); s('vc-addr',venueAddress);
  s('vc-map-lbl',ui.vcMapLbl);
  const map=document.getElementById('vc-map'); if(map)map.href=venueMapUrl;
  s('cal-cap',ui.calCap); s('cal-month',ui.calMonth);
  ui.calDays.forEach((d,i)=>s(`cdn-${i+1}`,d));
  s('msg-body',ui.msgBody); s('msg-sign-lbl',ui.msgSignLbl);
  s('msg-n1',groom); s('msg-n2',bride);
  s('rsvp-cap',ui.rsvpCap);
  s('l-name',ui.lName); s('l-attend',ui.lAttend);
  s('r-yes',ui.rYes); s('r-no',ui.rNo); s('l-count',ui.lCount);
  s('btn-submit',ui.btnSubmit);
  s('ok-h',ui.okH); s('ok-p',ui.okP);
  s('ft-names',`${groom} & ${bride}`); s('ft-date',date);
}

function initAnim(){
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){setTimeout(()=>e.target.classList.add('in'),i*80);obs.unobserve(e.target);}
    });
  },{threshold:0.1});
  document.querySelectorAll('.fade').forEach(el=>obs.observe(el));
}

function initMusic(){
  const audio=document.getElementById('bg-audio');
  const btn=document.getElementById('music-btn');
  const note=document.getElementById('icon-note');
  const eq=document.getElementById('icon-eq');
  const hint=document.getElementById('music-hint');
  let playing=false;

  function setPlaying(on){
    playing=on;
    note.style.display=on?'none':'block';
    eq.style.display=on?'flex':'none';
    btn.classList.toggle('paused',!on);
  }

  function startAudio(){
    audio.volume=0.5;
    audio.play().then(()=>{
      setPlaying(true);
      if(hint)hint.style.display='none';
    }).catch(()=>{});
  }

  function onFirstInteraction(){
    startAudio();
    if(hint)hint.style.display='none';
    document.removeEventListener('click',onFirstInteraction);
    document.removeEventListener('touchstart',onFirstInteraction);
  }

  audio.volume=0.5;
  audio.play().then(()=>{
    setPlaying(true);
    if(hint)hint.style.display='none';
  }).catch(()=>{
    if(hint)hint.style.display='flex';
    document.addEventListener('click',onFirstInteraction,{once:true});
    document.addEventListener('touchstart',onFirstInteraction,{once:true});
  });

  btn.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(playing){audio.pause();setPlaying(false);}
    else{startAudio();}
  });
}

function initForm(){
  const form=document.getElementById('rsvp-form');
  const btn=document.getElementById('btn-submit');
  const errDiv=document.getElementById('form-err');
  const okDiv=document.getElementById('rsvp-ok');
  const fcGroup=document.getElementById('fg-count');
  const{ui}=CONFIG;
  form.querySelectorAll('input[name="attending"]').forEach(r=>{
    r.addEventListener('change',()=>{ fcGroup.style.display=r.value==='yes'?'block':'none'; });
  });
  form.addEventListener('submit',async(e)=>{
    e.preventDefault(); errDiv.style.display='none';
    const name=document.getElementById('f-name').value.trim();
    const attended=form.querySelector('input[name="attending"]:checked');
    const count=document.getElementById('f-count').value;
    if(!name){showErr(ui.errName);document.getElementById('f-name').focus();return;}
    if(!attended){showErr(ui.errAttend);return;}
    if(!APPS_SCRIPT_URL){showErr(ui.errNoUrl);return;}
    setLoad(true);
    try{
      const res=await fetch(APPS_SCRIPT_URL,{
        method:'POST',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({name,attending:attended.value,guests:attended.value==='yes'?(parseInt(count,10)||1):0}),
      });
      const data=await res.json();
      if(data.result==='success'){form.style.display='none';okDiv.style.display='block';}
      else{showErr(data.message||ui.errNet);setLoad(false);}
    }catch{showErr(ui.errNet);setLoad(false);}
  });
  function showErr(msg){errDiv.textContent=msg;errDiv.style.display='block';errDiv.scrollIntoView({behavior:'smooth',block:'nearest'});}
  function setLoad(on){btn.disabled=on;btn.textContent=on?ui.btnSending:ui.btnSubmit;}
}

function initAutoScroll(){
  const sections=['hero','invite','venue','calendar','message','rsvp']
    .map(id=>document.getElementById(id)).filter(Boolean);
  let current=0, paused=false, resumeTimer=null;

  function scrollToNext(){
    if(paused||current>=sections.length-1)return;
    current++;
    sections[current].scrollIntoView({behavior:'smooth',block:'start'});
  }

  function onUserScroll(){
    paused=true;
    clearTimeout(resumeTimer);
    resumeTimer=setTimeout(()=>{paused=false;},8000);
  }

  window.addEventListener('wheel',     onUserScroll,{passive:true});
  window.addEventListener('touchmove', onUserScroll,{passive:true});
  window.addEventListener('keydown',   onUserScroll);

  new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){const i=sections.indexOf(e.target);if(i!==-1)current=i;}
    });
  },{threshold:0.5}).observe && sections.forEach(s=>
    new IntersectionObserver((entries)=>{
      if(entries[0].isIntersecting){const i=sections.indexOf(s);if(i!==-1)current=i;}
    },{threshold:0.5}).observe(s)
  );

  setInterval(scrollToNext,5000);
}

document.addEventListener('DOMContentLoaded',()=>{ render(); initAnim(); initMusic(); initForm(); initAutoScroll(); });
</script>
