<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Той шақыруы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ────────────────────────────────────────────
       PALETTE  Old Money
       #F8F5F2  cream
       #C4AF9C  taupe
       #537787  teal
       #2C3D51  navy
    ──────────────────────────────────────────── */
    :root {
      --cream : #F8F5F2;
      --white : #FFFFFF;
      --taupe : #C4AF9C;
      --teal  : #537787;
      --navy  : #2C3D51;
      --ink   : #1C2938;
      --muted : #7A8E9A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'PT Sans', sans-serif;
      font-weight: 400;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* ── Fade animations ─────────────────────── */
    .fade { opacity: 0; transform: translateY(20px); transition: opacity .9s ease, transform .9s ease; }
    .fade.in { opacity: 1; transform: none; }

    /* ── Sections ────────────────────────────── */
    .sec { padding: 96px 24px; text-align: center; }
    .inner { max-width: 560px; margin: 0 auto; }

    /* ── Caps ────────────────────────────────── */
    .cap {
      display: block;
      font-size: .6rem; font-weight: 500;
      letter-spacing: .3em; text-transform: uppercase;
      color: var(--teal); margin-bottom: 18px;
    }

    /* ── Headings ────────────────────────────── */
    h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(1.7rem, 4vw, 2.3rem);
      color: var(--navy); line-height: 1.2; margin-bottom: 36px;
    }

    p { color: var(--ink); }


    /* ════════════════════════════════════════════
       ORNAMENT COMPONENTS
    ════════════════════════════════════════════ */

    /* 1. Classic diamond-rule divider */
    .orn-rule {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 44px;
    }
    .orn-rule-line {
      height: 1px; flex: 1; max-width: 120px;
      background: linear-gradient(to right, transparent, var(--taupe));
    }
    .orn-rule-line.rev {
      background: linear-gradient(to left, transparent, var(--taupe));
    }
    .orn-rule-center {
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px;
    }
    .orn-rule-center .d  { width:7px; height:7px; background:var(--taupe); transform:rotate(45deg); }
    .orn-rule-center .ds { width:4px; height:4px; background:var(--taupe); transform:rotate(45deg); opacity:.5; }

    /* 2. Botanical branch — inline SVG, colour injected by class */
    .orn-branch { display:block; margin: 0 auto 44px; max-width:380px; width:100%; }

    /* 3. Section wave divider */
    .wave { display:block; line-height:0; overflow:hidden; }
    .wave svg { display:block; width:100%; }

    /* 4. Geometric frame around invite text */
    .frame {
      position: relative;
      padding: 36px 32px;
      margin-bottom: 36px;
    }
    .frame::before, .frame::after,
    .frame > .fc::before, .frame > .fc::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--taupe);
      border-style: solid;
      opacity: .7;
    }
    .frame::before   { top:0;    left:0;  border-width:1px 0 0 1px; }
    .frame::after    { top:0;    right:0; border-width:1px 1px 0 0; }
    .frame > .fc::before { bottom:0; left:0;  border-width:0 0 1px 1px; }
    .frame > .fc::after  { bottom:0; right:0; border-width:0 1px 1px 0; }

    /* 5. Pattern overlay on dark sections */
    .pat {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(196,175,156,.12) 1px, transparent 1px);
      background-size: 28px 28px;
    }


    /* ════════════════════════════════════════════
       HERO
    ════════════════════════════════════════════ */
    #hero {
      min-height: 100svh;
      background: var(--navy);
      display: grid; place-items: center;
      position: relative; overflow: hidden;
      padding: 80px 24px 120px;
      text-align: center;
    }

    /* Radial glow */
    #hero::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(83,119,135,.35) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 90% 90%,  rgba(44,61,81,.6)    0%, transparent 60%);
      pointer-events: none;
    }

    /* Corner ornament frames */
    .hero-frame {
      position: absolute;
      width: 90px; height: 90px;
      pointer-events: none;
    }
    .hero-frame svg { width: 100%; height: 100%; }
    .hf-tl { top: 24px;    left: 24px; }
    .hf-tr { top: 24px;    right: 24px; transform: scaleX(-1); }
    .hf-bl { bottom: 24px; left: 24px;  transform: scaleY(-1); }
    .hf-br { bottom: 24px; right: 24px; transform: scale(-1); }

    .hero-body { position: relative; z-index: 1; }

    .hero-eyebrow {
      display: block;
      font-size: .6rem; font-weight: 500;
      letter-spacing: .35em; text-transform: uppercase;
      color: var(--taupe); margin-bottom: 40px;
    }

    .hero-names {
      font-family: 'Playfair Display', serif;
      font-weight: 300;
      font-size: clamp(3.8rem, 13vw, 9rem);
      line-height: .95; color: var(--cream);
    }
    .hero-amp {
      display: block; font-style: italic;
      font-size: .42em; color: var(--taupe);
      margin: 14px 0 10px; letter-spacing: .05em;
    }

    /* Centre ornament between names and date */
    .hero-sep {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin: 30px auto 20px;
    }
    .hero-sep-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(196,175,156,.6));
    }
    .hero-sep-line.rev { background: linear-gradient(to left, transparent, rgba(196,175,156,.6)); }
    .hero-sep-diamond {
      width: 8px; height: 8px;
      background: var(--taupe); transform: rotate(45deg);
    }

    .hero-date {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: rgba(196,175,156,.85); letter-spacing: .05em;
    }

    .hero-scroll {
      position: absolute; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: bob 2.4s ease-in-out infinite;
    }
    .hero-scroll span {
      font-size: .58rem; letter-spacing: .22em;
      text-transform: uppercase; color: rgba(196,175,156,.6);
    }
    .hero-scroll-bar {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, rgba(196,175,156,.5), transparent);
    }
    @keyframes bob {
      0%,100% { transform: translateX(-50%) translateY(0); opacity: .6; }
      50%      { transform: translateX(-50%) translateY(7px); opacity: 1; }
    }


    /* ════════════════════════════════════════════
       INVITE
    ════════════════════════════════════════════ */
    #invite { background: var(--white); }

    .invite-salut {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.15rem;
      color: var(--teal); display: block; margin-bottom: 28px;
    }

    .invite-body {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.05rem, 2.2vw, 1.22rem);
      line-height: 2; color: var(--ink);
    }

    .invite-owner-label {
      font-size: .6rem; font-weight: 500;
      letter-spacing: .24em; text-transform: uppercase;
      color: var(--teal); display: block; margin-bottom: 10px;
    }
    .invite-owners {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem; color: var(--navy);
    }


    /* ════════════════════════════════════════════
       VENUE
    ════════════════════════════════════════════ */
    #venue { background: var(--cream); }

    .venue-cards {
      display: grid; gap: 16px;
      max-width: 480px; margin: 0 auto;
    }

    .vc {
      background: var(--white);
      position: relative; overflow: hidden;
      padding: 28px 26px 28px 36px;
      text-align: left;
    }
    /* left accent bar */
    .vc::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(to bottom, var(--navy), var(--teal));
    }

    .vc-lbl {
      font-size: .58rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--teal); display: block; margin-bottom: 10px;
    }
    .vc-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem; color: var(--navy); line-height: 1.5;
    }

    .map-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 14px;
      font-size: .67rem; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--teal); text-decoration: none;
      border-bottom: 1px solid var(--taupe); padding-bottom: 2px;
      transition: color .2s, border-color .2s;
    }
    .map-link:hover { color: var(--navy); border-color: var(--navy); }
    .map-link svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }


    /* ════════════════════════════════════════════
       DETAILS (dark)
    ════════════════════════════════════════════ */
    #details {
      background: var(--navy);
      position: relative; overflow: hidden;
    }
    #details h2 { color: var(--cream); }
    #details .cap { color: var(--taupe); }
    /* diamond rule colours on dark */
    #details .orn-rule-line     { background: linear-gradient(to right, transparent, rgba(196,175,156,.4)); }
    #details .orn-rule-line.rev { background: linear-gradient(to left,  transparent, rgba(196,175,156,.4)); }
    #details .orn-rule-center .d  { background: var(--taupe); }
    #details .orn-rule-center .ds { background: var(--taupe); }

    .det-grid {
      display: flex; flex-wrap: wrap; gap: 14px;
      justify-content: center;
      max-width: 500px; margin: 0 auto 24px;
    }
    .det-pill {
      flex: 1 1 200px;
      border: 1px solid rgba(196,175,156,.2);
      padding: 24px 22px; text-align: left;
      position: relative;
    }
    /* small corner gem on each card */
    .det-pill::before {
      content: '';
      position: absolute; top: -4px; right: -4px;
      width: 8px; height: 8px;
      background: var(--taupe); transform: rotate(45deg);
      opacity: .6;
    }
    .det-lbl {
      font-size: .58rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--taupe); display: block; margin-bottom: 8px;
    }
    .det-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--cream); line-height: 1.5;
    }

    /* Halal banner */
    .halal {
      max-width: 480px; margin: 0 auto;
      background: var(--teal);
      padding: 20px 24px;
      display: flex; align-items: flex-start; gap: 14px; text-align: left;
      position: relative; overflow: hidden;
    }
    .halal::after {
      content: '☪';
      position: absolute; right: 16px; bottom: -8px;
      font-size: 5rem; opacity: .06; color: #fff;
      line-height: 1; pointer-events: none;
    }
    .halal-icon { font-size: 1.4rem; flex-shrink: 0; color: #fff; line-height: 1.4; }
    .halal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: #fff !important; margin-bottom: 3px;
    }
    .halal-sub { font-size: .8rem; color: rgba(255,255,255,.8) !important; font-weight:300; line-height:1.5; }


    /* ════════════════════════════════════════════
       MESSAGE
    ════════════════════════════════════════════ */
    #message { background: var(--white); }

    .msg-body {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.05rem, 2.2vw, 1.28rem);
      line-height: 2; color: var(--ink);
      max-width: 480px; margin: 0 auto 40px;
    }
    .msg-sign-lbl {
      font-size: .6rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--teal); display: block; margin-bottom: 10px;
    }
    .msg-names {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 2.2rem; color: var(--navy);
    }
    .msg-amp { color: var(--taupe); }


    /* ════════════════════════════════════════════
       RSVP
    ════════════════════════════════════════════ */
    #rsvp { background: var(--cream); }

    .rsvp-hint {
      font-size: .9rem; color: var(--muted);
      max-width: 400px; margin: 0 auto 40px;
    }

    form { max-width: 440px; margin: 0 auto; text-align: left; }
    .fg { margin-bottom: 22px; }
    .fg > label {
      display: block;
      font-size: .62rem; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--navy); margin-bottom: 9px;
    }
    .req::after { content: ' *'; color: var(--taupe); }

    input[type="text"], input[type="number"] {
      width: 100%; background: var(--white);
      border: 1px solid var(--taupe);
      padding: 13px 16px;
      font-family: 'PT Sans', sans-serif;
      font-size: .95rem; font-weight: 300; color: var(--ink);
      outline: none; border-radius: 0;
      transition: border-color .2s; -webkit-appearance: none;
    }
    input:focus { border-color: var(--navy); }

    .radios { display: flex; gap: 10px; flex-wrap: wrap; }
    .rl {
      flex: 1 1 150px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; border: 1px solid var(--taupe);
      padding: 12px 16px;
      font-size: .9rem; font-weight: 300; color: var(--ink);
      transition: border-color .2s, background .2s;
    }
    .rl:has(input:checked) { border-color: var(--navy); background: rgba(44,61,81,.05); }
    .rl input[type="radio"] { display: none; }
    .rb {
      width: 17px; height: 17px;
      border: 1px solid var(--taupe); border-radius: 50%;
      display: grid; place-items: center; flex-shrink: 0;
      transition: border-color .2s;
    }
    .rb::after {
      content: ''; width: 8px; height: 8px;
      border-radius: 50%; background: var(--navy);
      opacity: 0; transition: opacity .2s;
    }
    .rl:has(input:checked) .rb { border-color: var(--navy); }
    .rl:has(input:checked) .rb::after { opacity: 1; }

    #fg-count { display: none; }

    .btn-submit {
      width: 100%; padding: 15px;
      background: var(--navy); color: var(--cream);
      border: none;
      font-family: 'PT Sans', sans-serif;
      font-size: .7rem; font-weight: 500;
      letter-spacing: .26em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, opacity .2s; margin-top: 8px;
    }
    .btn-submit:hover:not(:disabled) { background: var(--teal); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    #form-err {
      display: none; background: #FDF0EE;
      border: 1px solid #D4A09A;
      padding: 11px 16px; margin-top: 14px;
      font-size: .85rem; color: #7A2A22;
    }

    #rsvp-ok { display: none; text-align: center; padding: 48px 0; }
    .ok-icon {
      display: block; font-family: 'Playfair Display', serif;
      font-size: 3rem; color: var(--taupe);
      margin-bottom: 14px; line-height: 1;
    }
    .ok-h { font-family:'Playfair Display',serif; font-size:2rem; color:var(--navy); margin-bottom:10px; }
    .ok-p { font-size:.9rem; color:var(--muted); }


    /* ════════════════════════════════════════════
       FOOTER
    ════════════════════════════════════════════ */
    footer {
      background: var(--navy);
      text-align: center; padding: 52px 24px;
      position: relative;
    }
    .ft-ornament { display: block; margin: 0 auto 24px; opacity: .5; }
    .ft-names {
      display: block;
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.9rem;
      color: var(--cream); margin-bottom: 10px;
    }
    .ft-date { font-size: .7rem; letter-spacing: .16em; color: var(--taupe); }


    /* ════════════════════════════════════════════
       MUSIC BUTTON
    ════════════════════════════════════════════ */
    #music-btn {
      position: fixed; bottom: 26px; right: 22px; z-index: 999;
      width: 46px; height: 46px;
      background: var(--navy); border: 1px solid rgba(196,175,156,.5);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(44,61,81,.35);
      transition: background .2s, transform .15s;
    }
    #music-btn:hover { background: var(--teal); transform: scale(1.08); }
    #music-btn svg {
      width: 18px; height: 18px;
      stroke: var(--cream); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    .eq { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
    .eq span {
      width: 3px; background: var(--cream); border-radius: 2px;
      animation: eqb .85s ease-in-out infinite alternate;
    }
    .eq span:nth-child(1){animation-delay:0s;height:55%}
    .eq span:nth-child(2){animation-delay:.15s;height:100%}
    .eq span:nth-child(3){animation-delay:.3s;height:40%}
    .eq span:nth-child(4){animation-delay:.08s;height:75%}
    @keyframes eqb { from{transform:scaleY(.2)} to{transform:scaleY(1)} }
    #music-btn.paused .eq span { animation-play-state: paused; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     HERO
══════════════════════════════════════════ -->
<section id="hero">
  <!-- dot pattern -->
  <div class="pat"></div>

  <!-- corner ornament frames -->
  <div class="hero-frame hf-tl">
    <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 L2 38 M2 2 L38 2" stroke="#C4AF9C" stroke-width=".8" opacity=".6"/>
      <path d="M2 2 L18 18" stroke="#C4AF9C" stroke-width=".5" opacity=".3"/>
      <rect x="17" y="17" width="5" height="5" transform="rotate(45 17 17)" fill="#C4AF9C" opacity=".4"/>
      <circle cx="2" cy="2" r="2" fill="#C4AF9C" opacity=".5"/>
      <circle cx="2" cy="38" r="1.5" fill="#C4AF9C" opacity=".3"/>
      <circle cx="38" cy="2" r="1.5" fill="#C4AF9C" opacity=".3"/>
    </svg>
  </div>
  <div class="hero-frame hf-tr">
    <svg viewBox="0 0 90 90" fill="none"><path d="M2 2 L2 38 M2 2 L38 2" stroke="#C4AF9C" stroke-width=".8" opacity=".6"/><path d="M2 2 L18 18" stroke="#C4AF9C" stroke-width=".5" opacity=".3"/><rect x="17" y="17" width="5" height="5" transform="rotate(45 17 17)" fill="#C4AF9C" opacity=".4"/><circle cx="2" cy="2" r="2" fill="#C4AF9C" opacity=".5"/><circle cx="2" cy="38" r="1.5" fill="#C4AF9C" opacity=".3"/><circle cx="38" cy="2" r="1.5" fill="#C4AF9C" opacity=".3"/></svg>
  </div>
  <div class="hero-frame hf-bl">
    <svg viewBox="0 0 90 90" fill="none"><path d="M2 2 L2 38 M2 2 L38 2" stroke="#C4AF9C" stroke-width=".8" opacity=".6"/><path d="M2 2 L18 18" stroke="#C4AF9C" stroke-width=".5" opacity=".3"/><rect x="17" y="17" width="5" height="5" transform="rotate(45 17 17)" fill="#C4AF9C" opacity=".4"/><circle cx="2" cy="2" r="2" fill="#C4AF9C" opacity=".5"/><circle cx="2" cy="38" r="1.5" fill="#C4AF9C" opacity=".3"/><circle cx="38" cy="2" r="1.5" fill="#C4AF9C" opacity=".3"/></svg>
  </div>
  <div class="hero-frame hf-br">
    <svg viewBox="0 0 90 90" fill="none"><path d="M2 2 L2 38 M2 2 L38 2" stroke="#C4AF9C" stroke-width=".8" opacity=".6"/><path d="M2 2 L18 18" stroke="#C4AF9C" stroke-width=".5" opacity=".3"/><rect x="17" y="17" width="5" height="5" transform="rotate(45 17 17)" fill="#C4AF9C" opacity=".4"/><circle cx="2" cy="2" r="2" fill="#C4AF9C" opacity=".5"/><circle cx="2" cy="38" r="1.5" fill="#C4AF9C" opacity=".3"/><circle cx="38" cy="2" r="1.5" fill="#C4AF9C" opacity=".3"/></svg>
  </div>

  <div class="hero-body">
    <span class="hero-eyebrow fade" id="hero-eyebrow"></span>
    <h1 class="hero-names fade">
      <span id="h-name1"></span>
      <span class="hero-amp">&amp;</span>
      <span id="h-name2"></span>
    </h1>
    <div class="hero-sep fade">
      <div class="hero-sep-line"></div>
      <div class="hero-sep-diamond"></div>
      <div class="hero-sep-line rev"></div>
    </div>
    <p class="hero-date fade" id="hero-date"></p>
  </div>

  <div class="hero-scroll" aria-hidden="true">
    <span id="scroll-lbl"></span>
    <div class="hero-scroll-bar"></div>
  </div>
</section>

<!-- wave: navy → white -->
<div class="wave" style="background:var(--navy)">
  <svg viewBox="0 0 1440 70" preserveAspectRatio="none" height="70" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,0 C360,70 1080,70 1440,0 L1440,70 L0,70 Z" fill="#FFFFFF"/>
  </svg>
</div>


<!-- ══════════════════════════════════════════
     INVITE
══════════════════════════════════════════ -->
<section id="invite" class="sec" style="padding-top:48px">
  <div class="inner">
    <span class="invite-salut fade" id="invite-salut"></span>

    <!-- botanical branch ornament -->

<!-- ══════ SCRIPT ════════════════════════════════════ -->
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZPzP4f1qoPO_3zaFs7adcl9TbIVpvkZP74_lDljgpaPkuhTr79Pw7Kc411ngp7XbA/exec';

const CONFIG = {
  groom: '[АТЫ]',
  bride: '[АТЫ]',
  date:  '[КҮН, АЙ, ЖЫЛ]',
  owners:       '[ТОЙ ИЕЛЕРІ]',
  venueTime:    '[УАҚЫТ]',
  venueAddress: '[ТОЛЫҚ МЕКЕН-ЖАЙ]',
  venueMapUrl:  '#',
  dresscode:    '[КИІМ ҮЛГІСІ]',
  deadline:     '[МЕРЗІМ]',
  ui: {
    heroEyebrow: 'Той шақыруы',
    scrollLbl:   'Төмен',
    inviteSalut: 'Құрметті қонақтар!',
    inviteBody:  'Сіз(дер)ді ұлымыз [АТЫ] мен келініміз [АТЫ]ның шаңырақ көтеру тойына арналған салтанатты ақ дастарханымыздың қадірлі қонағы болуға шақырамыз.',
    ownerLbl:    'Той иелері:',
    venueCap:    'Той өтетін орын',
    vcTimeLbl:   'Басталу уақыты',
    vcAddrLbl:   'Мекен-жай',
    vcMapLbl:    'Картада ашу',
    detCap:      'Той туралы',
    detDresscode:'Дресс-код',
    detDeadline: 'Жауап беру мерзімі',
    halalTitle:  'Той Халал өтеді',
    halalSub:    'Дастарханға ешқандай алкоголь қойылмайды.',
    msgBody:     'Жуырда біздің өміріміздегі ең бақытты күндердің бірі болмақ! Сол бақытты күнде сіз(дер)ді жанымыздан көріп, қуанышымызбен бөліскіміз келеді! Тойымыздың салтанатты дастарханында сіз(дер)ді күтеміз!',
    msgSignLbl:  'Құрметпен,',
    rsvpCap:     'Қатысуыңызды растаңыз',
    rsvpHint:    'Тойға дайындалу үшін жауабыңызды [МЕРЗІМ] дейін жіберіңіз.',
    lName:       'Толық аты-жөні',
    lAttend:     'Келесіз бе?',
    rYes:        'Иә, келемін',
    rNo:         'Жоқ, келмеймін',
    lCount:      'Қанша адам?',
    btnSubmit:   'Жіберу',
    btnSending:  'Жіберілуде...',
    okH:         'Рахмет!',
    okP:         'Жауабыңыз қабылданды. Тойда кездескенше!',
    errName:     'Аты-жөніңізді жазыңыз.',
    errAttend:   'Жауап нұсқасын таңдаңыз.',
    errNoUrl:    'APPS_SCRIPT_URL орнатылмаған.',
    errNet:      'Жіберу қатесі. Байланысты тексеріп, қайта көріңіз.',
  }
};

function s(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

function render(){
  const{groom,bride,date,owners,venueTime,venueAddress,venueMapUrl,dresscode,deadline,ui}=CONFIG;
  document.title=`${groom} & ${bride} — Той шақыруы`;
  s('hero-eyebrow',ui.heroEyebrow); s('h-name1',groom); s('h-name2',bride);
  s('hero-date',date); s('scroll-lbl',ui.scrollLbl);
  s('invite-salut',ui.inviteSalut); s('invite-body',ui.inviteBody);
  s('owner-lbl',ui.ownerLbl); s('invite-owners',owners);
  s('venue-cap',ui.venueCap);
  s('vc-time-lbl',ui.vcTimeLbl); s('vc-time',venueTime);
  s('vc-addr-lbl',ui.vcAddrLbl); s('vc-addr',venueAddress);
  s('vc-map-lbl',ui.vcMapLbl);
  const map=document.getElementById('vc-map'); if(map)map.href=venueMapUrl;
  s('det-cap',ui.detCap);
  const grid=document.getElementById('det-grid');
  if(grid){
    grid.innerHTML=[
      {l:ui.detDresscode,v:dresscode},
      {l:ui.detDeadline, v:deadline },
    ].map(d=>`<div class="det-pill"><span class="det-lbl">${d.l}</span><p class="det-val">${d.v}</p></div>`).join('');
  }
  s('halal-title',ui.halalTitle); s('halal-sub',ui.halalSub);
  s('msg-body',ui.msgBody); s('msg-sign-lbl',ui.msgSignLbl);
  s('msg-n1',groom); s('msg-n2',bride);
  s('rsvp-cap',ui.rsvpCap); s('rsvp-hint',ui.rsvpHint);
  s('l-name',ui.lName); s('l-attend',ui.lAttend);
  s('r-yes',ui.rYes); s('r-no',ui.rNo); s('l-count',ui.lCount);
  s('btn-submit',ui.btnSubmit);
  s('ok-h',ui.okH); s('ok-p',ui.okP);
  s('ft-names',`${groom} & ${bride}`); s('ft-date',date);
}

function initAnim(){
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){setTimeout(()=>e.target.classList.add('in'),i*80);obs.unobserve(e.target);}
    });
  },{threshold:0.1});
  document.querySelectorAll('.fade').forEach(el=>obs.observe(el));
}

function initMusic(){
  const audio=document.getElementById('bg-audio');
  const btn=document.getElementById('music-btn');
  const note=document.getElementById('icon-note');
  const eq=document.getElementById('icon-eq');
  let playing=false,unlocked=false;
  function setPlaying(on){
    playing=on;
    note.style.display=on?'none':'block';
    eq.style.display=on?'flex':'none';
    btn.classList.toggle('paused',!on);
  }
  function tryPlay(){
    if(unlocked)return; unlocked=true;
    audio.volume=0.5;
    audio.play().then(()=>setPlaying(true)).catch(()=>{});
  }
  document.addEventListener('click',tryPlay,{once:true});
  document.addEventListener('touchstart',tryPlay,{once:true});
  btn.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(playing){audio.pause();setPlaying(false);}
    else{unlocked=true;audio.play().then(()=>setPlaying(true)).catch(()=>{});}
  });
}

function initForm(){
  const form=document.getElementById('rsvp-form');
  const btn=document.getElementById('btn-submit');
  const errDiv=document.getElementById('form-err');
  const okDiv=document.getElementById('rsvp-ok');
  const fcGroup=document.getElementById('fg-count');
  const{ui}=CONFIG;
  form.querySelectorAll('input[name="attending"]').forEach(r=>{
    r.addEventListener('change',()=>{ fcGroup.style.display=r.value==='yes'?'block':'none'; });
  });
  form.addEventListener('submit',async(e)=>{
    e.preventDefault(); errDiv.style.display='none';
    const name=document.getElementById('f-name').value.trim();
    const attended=form.querySelector('input[name="attending"]:checked');
    const count=document.getElementById('f-count').value;
    if(!name){showErr(ui.errName);document.getElementById('f-name').focus();return;}
    if(!attended){showErr(ui.errAttend);return;}
    if(!APPS_SCRIPT_URL){showErr(ui.errNoUrl);return;}
    setLoad(true);
    try{
      const res=await fetch(APPS_SCRIPT_URL,{
        method:'POST',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({name,attending:attended.value,guests:attended.value==='yes'?(parseInt(count,10)||1):0}),
      });
      const data=await res.json();
      if(data.result==='success'){form.style.display='none';okDiv.style.display='block';}
      else{showErr(data.message||ui.errNet);setLoad(false);}
    }catch{showErr(ui.errNet);setLoad(false);}
  });
  function showErr(msg){errDiv.textContent=msg;errDiv.style.display='block';errDiv.scrollIntoView({behavior:'smooth',block:'nearest'});}
  function setLoad(on){btn.disabled=on;btn.textContent=on?ui.btnSending:ui.btnSubmit;}
}

document.addEventListener('DOMContentLoaded',()=>{ render(); initAnim(); initMusic(); initForm(); });
</script>
